name: Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: voiceairegistry.azurecr.io
  IMAGE_NAME: voice-ai
  APP_SERVICE_NAME: voice-ai-app
  RESOURCE_GROUP: voice-ai-rg

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name voiceairegistry

      - name: Build and push Docker image
        run: |
          docker build \
            -t $ACR_REGISTRY/$IMAGE_NAME:latest \
            -t $ACR_REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            .
          docker push $ACR_REGISTRY/$IMAGE_NAME:latest
          docker push $ACR_REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Azure App Service
        run: |
          az webapp config container set \
            --name $APP_SERVICE_NAME \
            --resource-group $RESOURCE_GROUP \
            --container-image-name $ACR_REGISTRY/$IMAGE_NAME:${{ github.sha }}
          az webapp restart \
            --name $APP_SERVICE_NAME \
            --resource-group $RESOURCE_GROUP
