<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VoiceIQ Admin{% endblock %}</title>

  <!-- Tailwind CSS with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#026978",
            "primary-dim": "#005c69",
            "primary-container": "#9fecfd",
            "primary-fixed": "#9fecfd",
            "primary-fixed-dim": "#91ddee",
            "on-primary": "#eefbff",
            "on-primary-container": "#005865",
            "on-primary-fixed": "#00444f",
            "on-primary-fixed-variant": "#006371",
            "secondary": "#4b6369",
            "secondary-dim": "#3f575c",
            "secondary-container": "#cde7ed",
            "secondary-fixed": "#cde7ed",
            "secondary-fixed-dim": "#bfd9df",
            "on-secondary": "#eefbff",
            "on-secondary-container": "#3e555b",
            "on-secondary-fixed": "#2c4348",
            "on-secondary-fixed-variant": "#485f65",
            "tertiary": "#456182",
            "tertiary-dim": "#385575",
            "tertiary-container": "#b1cef4",
            "tertiary-fixed": "#b1cef4",
            "tertiary-fixed-dim": "#a4c1e6",
            "on-tertiary": "#f7f9ff",
            "on-tertiary-container": "#284665",
            "on-tertiary-fixed": "#123250",
            "on-tertiary-fixed-variant": "#324f6f",
            "error": "#a83836",
            "error-dim": "#67040d",
            "error-container": "#fa746f",
            "on-error": "#fff7f6",
            "on-error-container": "#6e0a12",
            "surface": "#f6fafb",
            "surface-bright": "#f6fafb",
            "surface-dim": "#d2dcdf",
            "surface-variant": "#dae4e7",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#eff5f6",
            "surface-container": "#e8eff1",
            "surface-container-high": "#e1eaec",
            "surface-container-highest": "#dae4e7",
            "on-surface": "#2a3436",
            "on-surface-variant": "#576163",
            "background": "#f6fafb",
            "on-background": "#2a3436",
            "outline": "#727c7f",
            "outline-variant": "#a9b4b6",
            "inverse-surface": "#0a0f10",
            "inverse-on-surface": "#999e9f",
            "inverse-primary": "#9fecfd",
            "surface-tint": "#026978",
          },
          fontFamily: {
            "headline": ["Newsreader", "serif"],
            "body": ["Roboto", "sans-serif"],
            "label": ["Roboto", "sans-serif"],
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Roboto', sans-serif; }
    .font-headline { font-family: 'Newsreader', serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #dae4e7; border-radius: 10px; }

    /* Badge classes for backward compat with filter output */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em; white-space: nowrap; text-transform: uppercase; }
    .badge-booking      { background: #d1fae5; color: #065f46; }
    .badge-escalated    { background: #fef3c7; color: #92400e; }
    .badge-unanswered   { background: #fee2e2; color: #991b1b; }
    .badge-faq          { background: #dbeafe; color: #1e40af; }
    .badge-hung-up      { background: #f1f5f9; color: #64748b; }
    .badge-other        { background: #f1f5f9; color: #64748b; }
    .badge-duplicate    { background: #fae8ff; color: #7e22ce; }

    /* SMS status indicators */
    .sms-ok   { color: #059669; font-weight: 600; font-size: 0.82rem; }
    .sms-warn { color: #d97706; font-weight: 600; font-size: 0.82rem; }
    .sms-na   { color: #a9b4b6; font-size: 0.82rem; }

    /* Transcript coloring */
    .agent-line  { color: #026978; font-weight: 600; }
    .patient-line { color: #2a3436; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">

<!-- Fixed Sidebar -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 flex flex-col p-4 z-50">
  <!-- Logo -->
  <div class="mb-8 px-2 flex items-center gap-3">
    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-on-primary">
      <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">voice_selection</span>
    </div>
    <span class="font-headline text-2xl font-bold text-[#006877]">VoiceIQ</span>
  </div>

  <!-- Main Nav -->
  <nav class="flex-1 flex flex-col gap-1">
    <a href="/admin/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'dashboard' %}text-[#006877] font-bold bg-white{% else %}text-slate-600 font-medium hover:bg-white/50{% endif %}">
      <span class="material-symbols-outlined" {% if active_page == 'dashboard' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
      <span class="text-sm">Dashboard</span>
    </a>
    <a href="/admin/calls" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'calls' %}text-[#006877] font-bold bg-white{% else %}text-slate-600 font-medium hover:bg-white/50{% endif %}">
      <span class="material-symbols-outlined" {% if active_page == 'calls' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>call</span>
      <span class="text-sm">Call Log</span>
    </a>
    <a href="/admin/queue" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'queue' %}text-[#006877] font-bold bg-white{% else %}text-slate-600 font-medium hover:bg-white/50{% endif %}">
      <span class="material-symbols-outlined" {% if active_page == 'queue' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>assignment</span>
      <span class="text-sm">Action Queue</span>
    </a>
    <a href="/admin/patients" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'patients' %}text-[#006877] font-bold bg-white{% else %}text-slate-600 font-medium hover:bg-white/50{% endif %}">
      <span class="material-symbols-outlined" {% if active_page == 'patients' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>group</span>
      <span class="text-sm">Patients</span>
    </a>
    <a href="/admin/analytics" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'analytics' %}text-[#006877] font-bold bg-white{% else %}text-slate-600 font-medium hover:bg-white/50{% endif %}">
      <span class="material-symbols-outlined" {% if active_page == 'analytics' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>analytics</span>
      <span class="text-sm">Analytics</span>
    </a>
  </nav>

  <!-- Bottom Nav -->
  <div class="mt-auto border-t border-slate-200/50 pt-4 flex flex-col gap-1">
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 font-medium hover:bg-white/50 rounded-lg transition-colors">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-sm">Settings</span>
    </a>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 font-medium hover:bg-white/50 rounded-lg transition-colors">
      <span class="material-symbols-outlined">help</span>
      <span class="text-sm">Support</span>
    </a>
  </div>
</aside>

<!-- Fixed Topbar -->
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 z-40 shadow-sm shadow-slate-200/50">
  <!-- Search -->
  <div class="flex items-center flex-1 max-w-xl">
    <div class="relative w-full">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
      <input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm transition-all" placeholder="Search enterprise data..." type="text">
    </div>
  </div>

  <!-- Right actions -->
  <div class="flex items-center gap-6">
    <button class="text-slate-600 hover:text-[#006877] transition-all relative">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full"></span>
    </button>
    <button class="text-slate-600 hover:text-[#006877] transition-all">
      <span class="material-symbols-outlined">help</span>
    </button>
    <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
      <div class="text-right hidden xl:block">
        <p class="text-xs font-bold text-on-surface">Admin User</p>
        <p class="text-[10px] text-on-surface-variant">Administrator</p>
      </div>
      <div class="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center text-primary font-bold text-sm">
        AU
      </div>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="ml-64 pt-16 min-h-screen">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
